{%load static%}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeAI | Password Reset Complete</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon1.ico' %}">

    <style>
        .auth-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent-color);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            background-color: rgba(0, 255, 136, 0.1);
            padding: 10px 20px;
            border-radius: 6px;
            display: inline-block;
        }

        .auth-footer a:hover {
            background-color: rgba(0, 255, 136, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                Trade<span>AI</span><span class="blink">—</span>
            </div>
            <div class="status-indicator">
                <div class="dot"></div>
                SYSTEM ONLINE
            </div>
        </header>

        <main>
            <div class="auth-container">
                <div class="auth-header">Password Reset Complete</div>
                <p style="text-align: center; color: #ccc; margin-bottom: 20px;">
                    Your password has been set. You may go ahead and log in now.
                </p>
                <div class="auth-footer">
                    <a href="{% url 'login' %}">Log In</a>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
