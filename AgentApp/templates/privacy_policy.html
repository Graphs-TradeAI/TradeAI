{%load static%}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeAI | Privacy Policy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css'%}">
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon1.ico' %}">
    <style>
        .privacy-page {
            background: var(--bg-primary, #0a0a0f);
            color: var(--text-primary, #e0e0e0);
            font-family: 'Inter', sans-serif;
        }

        .privacy-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            top: 0;
            position: sticky;
            z-index: 100;
        }

        .privacy-header .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }

        .privacy-header .logo span {
            color: var(--accent-color, #00ff9d);
        }

        .privacy-header .back-link {
            color: var(--accent-color, #00ff9d);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 20px;
            border: 1px solid var(--accent-color, #00ff9d);
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .privacy-header .back-link:hover {
            background: var(--accent-color, #00ff9d);
            color: #000;
        }

        .privacy-content {
            max-width: 860px;
            margin: 0 auto;
            padding: 50px 30px 80px;
            line-height: 1.8;
        }

        .privacy-content h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--accent-color, #00ff9d);
            padding-bottom: 12px;
        }

        .privacy-content h2 {
            font-size: 1.4rem;
            color: var(--accent-color, #00ff9d);
            margin-top: 40px;
            margin-bottom: 15px;
        }

        .privacy-content h3 {
            font-size: 1.15rem;
            color: #ccc;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .privacy-content p {
            color: #b0b0b0;
            margin-bottom: 14px;
            font-size: 0.95rem;
        }

        .privacy-content ul, .privacy-content ol {
            color: #b0b0b0;
            padding-left: 24px;
            margin-bottom: 14px;
        }

        .privacy-content li {
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        .privacy-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.9rem;
        }

        .privacy-content table th {
            background: rgba(0, 255, 157, 0.1);
            color: var(--accent-color, #00ff9d);
            text-align: left;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-weight: 600;
        }

        .privacy-content table td {
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #b0b0b0;
        }

        .privacy-content table tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .privacy-content a {
            color: var(--accent-color, #00ff9d);
            text-decoration: none;
        }

        .privacy-content a:hover {
            text-decoration: underline;
        }

        .privacy-content strong {
            color: #ddd;
        }

        .privacy-content hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 35px 0;
        }

        .privacy-content code {
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .privacy-footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            color: #555;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .privacy-header {
                padding: 15px 20px;
            }
            .privacy-content {
                padding: 30px 18px 60px;
            }
            .privacy-content h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body class="privacy-page">
    <div class="privacy-header">
        <div class="logo">
            Trade<span>AI</span>
        </div>
        <a href="{% url 'landing' %}" class="back-link">← Back to Home</a>
    </div>

    <div class="privacy-content">
        {{ privacy_html|safe }}
    </div>

    <div class="privacy-footer">
        &copy; 2026 TradeAI. All rights reserved.
    </div>
</body>

</html>
