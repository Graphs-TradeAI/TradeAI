{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeAI | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://apis.google.com/js/platform.js" async defer></script>
    <meta name="google-signin-client_id"
        content="540840467622-50jkljcosabe2hd1spohk8ccvmh2ef6n.apps.googleusercontent.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon1.ico' %}">

    <style>
        .auth-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent-color);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }

        .auth-footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
        .landing a{
    background-color: var(--accent-color);
    color: #000;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 700;
    transition: transform 0.2s;
}

    
        
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                Trade<span>AI</span><span class="blink">—</span>
            </div>
            <div class="landing">
                <a href="{% url 'landing' %}">Homepage</a>
            </div>
            <div class="status-indicator" id="status-indicator_login">
                <div class="dot"></div>
                SYSTEM ONLINE
            </div>
        </header>

        <main>
            <div class="auth-container">
                <div class="auth-header">Login</div>
                <form method="post" id="loginForm">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="form-group">
                        {{ field }}
                        {% if field.errors %}
                        <div style="color: var(--loss-color); font-size: 0.8rem; margin-top: 5px;">
                            {{ field.errors.0 }}
                        </div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <div class="form-group" style="display: flex; align-items: flex-start; gap: 10px; margin: 18px 0;">
                        <input type="checkbox" id="login_agree_privacy" style="margin-top: 4px; accent-color: var(--accent-color); width: 16px; height: 16px; cursor: pointer;">
                        <label for="login_agree_privacy" style="font-size: 0.85rem; color: #aaa; cursor: pointer; line-height: 1.4;">
                            I agree to the <a href="{% url 'privacy_policy' %}" target="_blank" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">Privacy Policy</a>
                        </label>
                    </div>
                    <div id="loginPrivacyError" style="color: var(--loss-color); font-size: 0.8rem; margin-bottom: 10px; display: none;">
                        You must agree to the Privacy Policy to continue.
                    </div>

                    <button type="submit" style="width: 100%;">Log In</button>
                </form>
                <div class="auth-footer">
                    <a href="{% url 'forgot_password' %}">Forgot Password?</a>
                    <br><br>
                    Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
                </div>
                <div class="g-signin2" data-onsuccess="onSignIn"></div>
            </div>
        </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            var cb = document.getElementById('login_agree_privacy');
            var errDiv = document.getElementById('loginPrivacyError');
            if (!cb.checked) {
                e.preventDefault();
                errDiv.style.display = 'block';
                cb.focus();
            } else {
                errDiv.style.display = 'none';
            }
        });
    </script>
    </div>
</body>

</html>
